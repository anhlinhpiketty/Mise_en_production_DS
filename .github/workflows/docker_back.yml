name: Build and push Back Docker image

on:
  push:
    branches:
      - main
      - anhlinh
      - colas
      - arthur
    tags:
      - 'v*.*'
      - 'v*.*-*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME_BACK }}/jobless_front

      - name: Se connecter à Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME_BACK }}
          password: ${{ secrets.DOCKERHUB_TOKEN_BACK }}
        
      - name: Build et push de l'image de l'api (backend)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./app/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            AWS_S3_ENDPOINT=${{ vars.AWS_S3_ENDPOINT }}
            BASE_URL=${{ vars.BASE_URL }}
            MODEL_NAME=${{ vars.MODEL_NAME }}
            S3_PATH=${{ vars.S3_PATH }}